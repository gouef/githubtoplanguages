
<svg width="300" height="170" viewBox="0 0 300 170" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="descId">
    <style>
        .header {
            font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif;
            fill: #41b883;
            animation: fadeInAnimation 0.8s ease-in-out forwards;
        }
        @supports(-moz-appearance: auto) {
             
            .header { font-size: 15.5px; }
        }

        @keyframes slideInAnimation {
            from {
                width: 0;
            }
            to {
                width: calc(100%-100px);
            }
        }
        @keyframes growWidthAnimation {
            from {
                width: 0;
            }
            to {
                width: 100%;
            }
        }
        .stat {
            font: 600 14px 'Segoe UI', Ubuntu, "Helvetica Neue", Sans-Serif; fill: #fffefe;
        }
        @supports(-moz-appearance: auto) {
             
            .stat { font-size:12px; }
        }
        .bold { font-weight: 700 }
        .lang-name {
            font: 400 11px "Segoe UI", Ubuntu, Sans-Serif;
            fill: #fffefe;
        }
        .stagger {
            opacity: 0;
            animation: fadeInAnimation 0.3s ease-in-out forwards;
        }
        #rect-mask rect{
            animation: slideInAnimation 1s ease-in-out forwards;
        }
        .lang-progress{
            animation: growWidthAnimation 0.6s ease-in-out forwards;
        }



         
        @keyframes scaleInAnimation {
            from {
                transform: translate(-5px, 5px) scale(0);
            }
            to {
                transform: translate(-5px, 5px) scale(1);
            }
        }
        @keyframes fadeInAnimation {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
    </style>
    <rect x="0.5" y="0.5" rx="4.5" height="99%" stroke="#e4e2e2" width="299" fill="#273849" stroke-opacity="0"/>
    <g transform="translate(25, 35)">
        <g transform="translate(0, 0)">
            <text x="0" y="0" class="header">Most Used Languages</text>
        </g>
    </g>

    <g transform="translate(0, 55)">
        <svg x="25">
            <mask id="rect-mask">
                <rect x="0" y="0" width="250" height="8" fill="white" rx="5"/>
            </mask>
            
                <rect mask="url(#rect-mask)" x="0" y="0" width="182.87561946188154" height="8" fill="#555555"/>
            
                <rect mask="url(#rect-mask)" x="182.87561946188154" y="0" width="28.172203519419263" height="8" fill="#00ADD8"/>
            
                <rect mask="url(#rect-mask)" x="211.0478229813008" y="0" width="18.554678652566817" height="8" fill="#4F5D95"/>
            
                <rect mask="url(#rect-mask)" x="229.60250163386763" y="0" width="13.737411580626372" height="8" fill="#f34b7d"/>
            
                <rect mask="url(#rect-mask)" x="243.339913214494" y="0" width="4.259025264505361" height="8" fill="#384d54"/>
            
                <rect mask="url(#rect-mask)" x="247.59893847899937" y="0" width="2.4010615210006394" height="8" fill="#e34c26"/>
            

            <g transform="translate(0, 25)">
                <g transform="translate(0, 0)">
                    
                        <g transform="translate(0, 0)">
                            <g class="stagger" style="animation-delay: 450ms">
                                <circle cx="5" cy="6" r="5" fill="#555555" />
                                <text x="15" y="10" class='lang-name'>
                                    C 73.15%
                                </text>
                            </g>
                        </g>
                    
                        <g transform="translate(0, 25)">
                            <g class="stagger" style="animation-delay: 600ms">
                                <circle cx="5" cy="6" r="5" fill="#00ADD8" />
                                <text x="15" y="10" class='lang-name'>
                                    Go 11.27%
                                </text>
                            </g>
                        </g>
                    
                        <g transform="translate(0, 50)">
                            <g class="stagger" style="animation-delay: 750ms">
                                <circle cx="5" cy="6" r="5" fill="#4F5D95" />
                                <text x="15" y="10" class='lang-name'>
                                    PHP 7.42%
                                </text>
                            </g>
                        </g>
                    
                </g>
                <g transform="translate(150, 0)">
                    
                        <g transform="translate(0, 0)">
                            <g class="stagger" style="animation-delay: 450ms">
                                <circle cx="5" cy="6" r="5" fill="#f34b7d" />
                                <text x="15" y="10" class='lang-name'>
                                    C&#43;&#43; 5.49%
                                </text>
                            </g>
                        </g>
                    
                        <g transform="translate(0, 25)">
                            <g class="stagger" style="animation-delay: 600ms">
                                <circle cx="5" cy="6" r="5" fill="#384d54" />
                                <text x="15" y="10" class='lang-name'>
                                    Dockerfile 1.70%
                                </text>
                            </g>
                        </g>
                    
                        <g transform="translate(0, 50)">
                            <g class="stagger" style="animation-delay: 750ms">
                                <circle cx="5" cy="6" r="5" fill="#e34c26" />
                                <text x="15" y="10" class='lang-name'>
                                    HTML 0.96%
                                </text>
                            </g>
                        </g>
                    
                </g>
            </g>
        </svg>
    </g>
</svg>
