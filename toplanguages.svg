
<svg width="490" height="320" viewBox="0 0 490 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="descId">
    <style>
        .header {
            font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif;
            fill: #41b883;
            animation: fadeInAnimation 0.8s ease-in-out forwards;
        }
        @supports(-moz-appearance: auto) {
             
            .header { font-size: 15.5px; }
        }

        @keyframes slideInAnimation {
            from { width: 0; }
            to { width: calc(100%-100px); }
        }
        @keyframes growWidthAnimation {
            from { width: 0; }
            to { width: 100%; }
        }
        .stat {
            font: 600 14px 'Segoe UI', Ubuntu, "Helvetica Neue", Sans-Serif; fill: #fffefe;
        }
        @supports(-moz-appearance: auto) {
             
            .stat { font-size:12px; }
        }
        .bold { font-weight: 700 }
        .lang-name {
            font: 400 11px "Segoe UI", Ubuntu, Sans-Serif;
            fill: #fffefe;
        }
        .stagger {
            opacity: 0;
            animation: fadeInAnimation 0.3s ease-in-out forwards;
        }
        #rect-mask rect{
            animation: slideInAnimation 1s ease-in-out forwards;
        }
        .lang-progress{
            animation: growWidthAnimation 0.6s ease-in-out forwards;
        }

         
        @keyframes scaleInAnimation {
            from { transform: translate(-5px, 5px) scale(0); }
            to { transform: translate(-5px, 5px) scale(1); }
        }
        @keyframes fadeInAnimation {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
    
    <rect x="0.5" y="0.5" rx="4.5" height="99%" stroke="#e4e2e2" width="489" fill="#273849" stroke-opacity="0"/>
    
    <g transform="translate(245, 35)">
        <text x="0" y="0" class="header" text-anchor="middle">Most Used Languages</text>
    </g>

    <g transform="translate(0, 55)">
        <svg x="20"> <mask id="rect-mask">
                 <rect x="0" y="0" width="450" height="8" fill="white" rx="5"/>
            </mask>
            
                <rect mask="url(#rect-mask)" x="0" y="0" width="291.7177485911761" height="8" fill="#f34b7d"/>
            
                <rect mask="url(#rect-mask)" x="291.7177485911761" y="0" width="101.9075233359166" height="8" fill="#555555"/>
            
                <rect mask="url(#rect-mask)" x="393.6252719270927" y="0" width="16.7278692040504" height="8" fill="#00ADD8"/>
            
                <rect mask="url(#rect-mask)" x="410.3531411311431" y="0" width="15.578033537313104" height="8" fill="#4F5D95"/>
            
                <rect mask="url(#rect-mask)" x="425.9311746684562" y="0" width="5.552273425586152" height="8" fill="#f1e05a"/>
            
                <rect mask="url(#rect-mask)" x="431.4834480940424" y="0" width="18.51655190595765" height="8" fill="#d4d4d4"/>
            

            <g transform="translate(0, 25)">
                <g transform="translate(5, 0)">
                    
                        <g transform="translate(0, 0)">
                            <g class="stagger" style="animation-delay: 450ms">
                                <circle cx="5" cy="6" r="5" fill="#f34b7d" />
                                <text x="15" y="10" class='lang-name'>
                                    C&#43;&#43; 64.83%
                                </text>
                            </g>
                        </g>
                    
                        <g transform="translate(0, 25)">
                            <g class="stagger" style="animation-delay: 600ms">
                                <circle cx="5" cy="6" r="5" fill="#555555" />
                                <text x="15" y="10" class='lang-name'>
                                    C 22.65%
                                </text>
                            </g>
                        </g>
                    
                        <g transform="translate(0, 50)">
                            <g class="stagger" style="animation-delay: 750ms">
                                <circle cx="5" cy="6" r="5" fill="#00ADD8" />
                                <text x="15" y="10" class='lang-name'>
                                    Go 3.72%
                                </text>
                            </g>
                        </g>
                    
                </g>
                
                <g transform="translate(235, 0)">
                    
                        <g transform="translate(0, 0)">
                            <g class="stagger" style="animation-delay: 450ms">
                                <circle cx="5" cy="6" r="5" fill="#4F5D95" />
                                <text x="15" y="10" class='lang-name'>
                                    PHP 3.46%
                                </text>
                            </g>
                        </g>
                    
                        <g transform="translate(0, 25)">
                            <g class="stagger" style="animation-delay: 600ms">
                                <circle cx="5" cy="6" r="5" fill="#f1e05a" />
                                <text x="15" y="10" class='lang-name'>
                                    JavaScript 1.23%
                                </text>
                            </g>
                        </g>
                    
                        <g transform="translate(0, 50)">
                            <g class="stagger" style="animation-delay: 750ms">
                                <circle cx="5" cy="6" r="5" fill="#d4d4d4" />
                                <text x="15" y="10" class='lang-name'>
                                    Others 4.11%
                                </text>
                            </g>
                        </g>
                    
                </g>
            </g>
        </svg>
    </g>


    <g transform="translate(10, 180)">
        <rect width="470" height="120" rx="6" fill="#1f2d3d" stroke="#2e3f51" stroke-width="1"/>

        <g transform="translate(0, 20)">
            <text x="78" y="30" fill="#2eb872" font-family="Segoe UI, Ubuntu, sans-serif" font-weight="bold" font-size="22px" text-anchor="middle">
                1.6K
            </text>
            <text x="78" y="55" fill="#a4b1cd" font-family="Segoe UI, Ubuntu, sans-serif" font-size="12px" text-anchor="middle">
